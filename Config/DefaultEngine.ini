; RuntimeGeneration=Dynamic (2026-07-23). Static + World Partition/OFPA давал
; "Unable to find RecastNavMesh instance while trying to create UCrowdManager":
; навмеш не готов к инициализации Detour Crowd -> объезд отключался (боты бежали
; в стену и застывали), а в Standalone навмеш строился неверно. Dynamic генерит
; навмеш в рантайме одинаково в PIE/Standalone/пакете, инстанс RecastNavMesh
; всегда существует -> CrowdManager его находит. Занятость юнитов ПО-ПРЕЖНЕМУ
; дисками (UTacticsCombatStatics::GetUnitObstacles), nav-модификаторы не нужны.
; ВНИМАНИЕ: сам актор RecastNavMesh в уровне хранит свою сериализованную
; RuntimeGeneration — этот ключ задаёт лишь дефолт для НОВЫХ навмешей. Актор в
; Lvl_TopDown уже переключён на Dynamic (правкой + Build Paths + сохранением).
; Масштаб на большие карты: Navigation Invoker уже висит на AUnitBase (компонент
; NavInvoker); включить bGenerateNavigationOnlyAroundNavigationInvokers=True в
; секции [/Script/Engine.NavigationSystemV1] — тогда навмеш строится только
; вокруг юнитов (тайлы у больших карт не собираются целиком).
RuntimeGeneration=Dynamic

